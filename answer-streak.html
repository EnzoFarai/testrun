<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Answer Streak Celebration!</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Atkinson Hyperlegible Next', sans-serif;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #4B4B4B;
    }
    
    .celebration-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      max-width: 100%;
      padding: 2rem;
      text-align: center;
    }
    
    .celebration-speech-bubble {
      --bbColor: white;
      --bbArrowSize: clamp(1rem, 2.5vw, 1.2rem);
      --bbBorderRadius: 0.4rem;
      --bbPadding: clamp(1rem, 3vw, 1.2rem);
      background: var(--bbColor);
      border-radius: var(--bbBorderRadius);
      padding: var(--bbPadding);
      position: relative;
      border: 2px solid #E5E5E5;
      color: black;
      width: 100%;
      max-width: 300px;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.1));
    }
    
    .celebration-speech-bubble::before,
    .celebration-speech-bubble::after {
      content: ''; 
      position: absolute;
      z-index: 1;
    }
    
    .celebration-speech-bubble[pbottom] { margin-bottom: var(--bbArrowSize); }
    
    .celebration-speech-bubble[pbottom]::before {
      top: 100%;
      border: solid transparent;
      border-width: var(--bbArrowSize) calc(var(--bbArrowSize) * 0.75) 0;
      border-top-color: #E5E5E5;
    }
    
    .celebration-speech-bubble[pbottom]::after {
      top: calc(100% - 2px);
      border: solid transparent;
      border-width: calc(var(--bbArrowSize) - 2px) calc(var(--bbArrowSize) * 0.75 - 2px) 0;
      border-top-color: var(--bbColor);
    }
    
    .celebration-speech-bubble[pbottom][acenter]::before,
    .celebration-speech-bubble[pbottom][acenter]::after {
      left: 50%;
      transform: translateX(-50%);
    }
    
    .celebration-bubble-text {
      font-size: clamp(1.1rem, 3vw, 1.3rem);
      line-height: 1.3;
      font-family: 'Atkinson Hyperlegible Next', sans-serif;
      font-weight: 400;
      color: black;
    }
    
    .celebration-icon-container {
      color: #4285F4;
      font-size: clamp(3.5rem, 8vw, 5rem);
      flex-shrink: 0;
      animation: bounce 1.5s ease-in-out infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    
    .celebration-continue-btn {
      width: 100%;
      max-width: 300px;
      padding: 1rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: white;
      background-color: #4285F4;
      border: none;
      border-bottom: 0.25rem solid #3A75D9;
      border-radius: 0.75rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s ease;
      font-family: 'Atkinson Hyperlegible Next', sans-serif;
    }
    
    .celebration-continue-btn:hover {
      background-color: #3A75D9;
      border-bottom-color: #3166c4;
      transform: translateY(-0.125rem);
    }
    
    .celebration-continue-btn:active {
      transform: translateY(0.0625rem);
      border-bottom-width: 0.125rem;
    }
    
    @media (max-width: 480px) {
      .celebration-container {
        padding: 1.5rem;
      }
      .celebration-icon-container {
        font-size: 4rem;
      }
      .celebration-speech-bubble {
        max-width: 280px;
        min-height: 65px;
      }
      .celebration-bubble-text {
        font-size: 1.1rem;
      }
    }
    
    @media (max-width: 320px) {
      .celebration-container {
        padding: 1rem;
      }
      .celebration-icon-container {
        font-size: 3.5rem;
      }
      .celebration-speech-bubble {
        max-width: 260px;
        min-height: 60px;
      }
      .celebration-bubble-text {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- Clapping audio -->
  <audio id="clappingAudio" preload="auto">
    <source src="https://github.com/EnzoFarai/RsLib/raw/main/audios/clapping.mp3" type="audio/mpeg">
  </audio>
  
  <div class="celebration-container">
    <div class="celebration-speech-bubble" pbottom acenter style="--bbColor:#FFFFFF">
      <div class="celebration-bubble-text" id="celebrationMessage"></div>
    </div>
    
    <div class="celebration-icon-container">
      <i class="ph-fill ph-rabbit"></i>
    </div>
    
    <button class="celebration-continue-btn" id="continueBtn">Continue</button>
  </div>

  <script>
    function playClappingSound() {
      const audio = document.getElementById('clappingAudio');
      if (audio) {
        audio.currentTime = 0;
        audio.play().catch(e => console.log("Audio play failed:", e));
      }
    }
    
    function getMessageForStreak(streak) {
      switch(streak) {
        case 5: return "5 in a row! Fantastic!";
        case 10: return "Wow, that's now 10 in a row! Is there anything you don't know?";
        case 15: return "15 in a row! That's the definition of perfection!";
        case 20: return "20 in a row! You're a pro!";
        case 25: return "25 in a row! Are you even human?";
        default: return `${streak} in a row! Amazing!`;
      }
    }
    
    const urlParams = new URLSearchParams(window.location.search);
    const streakCount = parseInt(urlParams.get('streak')) || 5;
    
    const messageElement = document.getElementById('celebrationMessage');
    messageElement.textContent = getMessageForStreak(streakCount);
    
    // Play clapping sound when modal loads
    playClappingSound();
    
    document.getElementById('continueBtn').addEventListener('click', () => {
      window.parent.postMessage('modalClose', '*');
    });
  </script>
</body>
</html>
