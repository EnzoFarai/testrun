<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Complete</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
<link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" rel="stylesheet">
<link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Atkinson Hyperlegible Next', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  background: #FFFFFF;
  color: #0f1c22;
  display: flex;
  justify-content: center;
  position: relative;
  overflow: hidden;
  min-height: 100vh;
}

.app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  padding: 24px 18px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 20;
  background: transparent;
}

.title {
  margin-top: 12px;
  text-align: center;
  font-weight: 900;
  color: #ffd24a;
  font-size: 34px;
  line-height: 1.1;
  letter-spacing: 0.5px;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
  z-index: 30;
}

.scene {
  position: relative;
  width: 100%;
  height: 260px;
  margin-top: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 30;
}

.emoji-container {
  position: relative;
  width: 160px;
  height: 160px;
  display: flex;
  justify-content: center;
  align-items: center;
  animation: bounce 2s ease-in-out infinite;
  z-index: 40;
}

lottie-player {
  width: 160px !important;
  height: 160px !important;
  filter: drop-shadow(0 4px 8px rgba(255, 210, 74, 0.3));
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

.stats {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 18px;
  z-index: 30;
}

.stat {
  background: #FFFFFF;
  border-radius: 16px;
  padding: 0;
  text-align: center;
  border: 2px solid;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.stat-header {
  padding: 12px 6px;
  color: #FFFFFF;
  font-size: 11px;
  letter-spacing: .8px;
  font-weight: 700;
  text-transform: uppercase;
}

.stat-content {
  padding: 14px 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.stat .value {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: .5px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.stat.tiger {
  border-color: #FF6D01;
}
.stat.tiger .stat-header {
  background-color: #FF6D01;
}
.stat.tiger .value {
  color: #FF6D01;
}

.stat.carpenter-blue {
  border-color: #4285F4;
}
.stat.carpenter-blue .stat-header {
  background-color: #4285F4;
}
.stat.carpenter-blue .value {
  color: #4285F4;
}

.stat.boa {
  border-color: #34A853;
}
.stat.boa .stat-header {
  background-color: #34A853;
}
.stat.boa .value {
  color: #34A853;
}

.ph, .ph-fill, .ph-duotone {
  display: inline-block;
  font-size: 20px;
  line-height: 1;
}

.continue-wrap {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #FFFFFF;
  padding: 14px 16px 22px;
  border-top: 1px solid #ededed;
  z-index: 100;
  width: 100%;
}

.continue {
  width: 100%;
  max-width: 420px;
  margin: 0 auto;
  height: 52px;
  border-radius: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  border: none;
  font-size: 15px;
  text-transform: uppercase;
  cursor: pointer;
  font-family: 'Atkinson Hyperlegible Next', sans-serif;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  transition: all 0.2s ease;
  z-index: 10;
  padding: 1rem;
  font-size: 1.1rem;
  color: #FFFFFF;
  background-color: #4285F4;
  border-bottom: 0.25rem solid #3a75d9;
  display: block;
}

.continue:hover {
  background-color: #3a75d9;
  border-bottom-color: #3166c4;
  transform: translateY(-0.125rem);
}

.continue:active {
  transform: translateY(0.0625rem);
  border-bottom-width: 0.125rem;
}

.fireworks-wrapper {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10;
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 0 50px;
}

.fireworks {
  position: relative;
  z-index: 15;
  width: 2.5em;
  height: 2em;
  background: transparent;
  animation: flatify-firework ease-in-out 4s 0s infinite;
  font-size: 2.5em !important;
}

.fireworks:before,
.fireworks .spark:before,
.fireworks .spark:after {
  content: " ";
  position: absolute;
  height: 0.25em;
  border-radius: 50em;
  background: var(--flatify__firework-color-main);
}

.fireworks:before {
  top: 0;
  bottom: 0;
  left: 0;
  right: 0;
  width: 0.25em;
  margin: auto;
  animation: flatify-firework-main ease-in-out 4s 0s infinite both;
}

.fireworks .spark {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  animation: flatify-firework-sparks ease-in-out 4s 0s infinite both;
}

.fireworks .spark:nth-child(1):before,
.fireworks .spark:nth-child(1):after,
.fireworks .spark:nth-child(2):before,
.fireworks .spark:nth-child(2):after {
  top: 0;
  bottom: 0;
  width: 1.5em;
  margin: auto;
}

.fireworks .spark:nth-child(1):before,
.fireworks .spark:nth-child(2):before {
  left: -0.25em;
  animation: flatify-firework-spark-left ease-in-out 4s 0s infinite;
}

.fireworks .spark:nth-child(1):after,
.fireworks .spark:nth-child(2):after {
  right: -0.25em;
  animation: flatify-firework-spark-right ease-in-out 4s 0s infinite;
}

.fireworks .spark:nth-child(1) {
  --flatify__firework-color-main: #5D9CEC;
}

.fireworks .spark:nth-child(2) {
  --flatify__firework-color-main: #5D9CEC;
  transform: rotate(90deg);
}

.fireworks .spark:nth-child(3),
.fireworks .spark:nth-child(4) {
  left: 0;
}

.fireworks .spark:nth-child(3):before,
.fireworks .spark:nth-child(3):after,
.fireworks .spark:nth-child(4):before,
.fireworks .spark:nth-child(4):after {
  width: 0.75em;
}

.fireworks .spark:nth-child(3):before,
.fireworks .spark:nth-child(4):before {
  top: 0;
  transform: rotate(45deg);
  animation: flatify-firework-spark-corner-top ease-in-out 4s 0s infinite;
}

.fireworks .spark:nth-child(3):after,
.fireworks .spark:nth-child(4):after {
  bottom: 0;
  transform: rotate(-45deg);
  animation: flatify-firework-spark-corner-bottom ease-in-out 4s 0s infinite;
}

.fireworks .spark:nth-child(3) {
  --flatify__firework-color-main: #967ADC;
}

.fireworks .spark:nth-child(4) {
  --flatify__firework-color-main: #967ADC;
  transform: rotate(180deg);
}

.fireworks-1 {
  align-self: flex-start;
  transform: rotate(-30deg);
  position: relative;
  top: 200px;
  left: 50px;
}

.fireworks-2 {
  --flatify__firework-color-main: #ffce54;
  --flatify__firework-color-center-top-bottom: #fc6e51;
  --flatify__firework-color-center-left-right: #f6bb42;
  --flatify__firework-color-left-top-bottom: #22c55e;
  --flatify__firework-color-right-top-bottom: #a855f7;
  align-self: center;
  position: relative;
  top: 200px;
}

.fireworks-3 {
  align-self: flex-start;
  transform: rotate(30deg);
  position: relative;
  top: 200px;
  right: 50px;
}

@keyframes flatify-firework {
  0%,20% { transform: translateY(0); }
  40% { transform: translateY(-1em); }
  80%,100% { transform: translateY(0.5em); }
}

@keyframes flatify-firework-main {
  0% { opacity: 0; transform: scale(0) translateY(1em); }
  5% { opacity: 1; transform: scale(0, 6) translateY(1em); }
  26% { transform: scaleY(2) translateY(0); }
  30% { transform: scale(9) translateY(0); }
  40%,100% { transform: scale(0) translateY(0); }
}

@keyframes flatify-firework-sparks {
  0%,30% { clip-path: circle(0 at center); opacity: 0; }
  38% { clip-path: circle(100% at center); opacity: 1; }
  65%,100% { opacity: 0; }
}

@keyframes flatify-firework-spark-corner-top {
  0%,30% { opacity: 1; clip-path: circle(100% at left); transform: scale(1) translate(0) rotate(45deg); }
  40% { clip-path: circle(100% at left); }
  60%,100% { opacity: 0; clip-path: circle(0 at left); transform: scale(1.5) translate(-0.5em, -0.25em) rotate(45deg); }
}

@keyframes flatify-firework-spark-corner-bottom {
  0%,30% { opacity: 1; clip-path: circle(100% at left); transform: scale(1) translate(0) rotate(-45deg); }
  40% { clip-path: circle(100% at left); }
  60%,100% { opacity: 0; clip-path: circle(0 at left); transform: scale(1.5) translate(-0.5em, 0.25em) rotate(-45deg); }
}

@keyframes flatify-firework-spark-left {
  0%,30% { opacity: 1; clip-path: circle(100% at left); transform: scale(1) translate(0); }
  40% { clip-path: circle(100% at left); }
  60%,100% { opacity: 0; clip-path: circle(0 at left); transform: scaleX(2) translate(-0.5em); }
}

@keyframes flatify-firework-spark-right {
  0%,30% { opacity: 1; clip-path: circle(100% at right); transform: scale(1) translate(0); }
  40% { clip-path: circle(100% at right); }
  60%,100% { opacity: 0; clip-path: circle(0 at right); transform: scaleX(2) translate(0.5em); }
}

@media (max-width: 768px) {
  .fireworks-wrapper { padding: 0 20px; }
  .fireworks { font-size: 1.8em !important; }
  .fireworks-1, .fireworks-3 { top: 150px; }
  .fireworks-1 { left: 20px; }
  .fireworks-3 { right: 20px; }
  .fireworks-2 { top: 150px; }
  .stat .value { font-size: 16px; }
  .title { font-size: 28px; }
  .stat-header { font-size: 10px; padding: 10px 4px; }
  .stat-content { padding: 12px 4px; }
}
</style>
</head>

<body>
<div class="fireworks-wrapper">
  <div class="fireworks fireworks-1" aria-hidden="true"><span class="spark"></span><span class="spark"></span><span class="spark"></span><span class="spark"></span></div>
  <div class="fireworks fireworks-2" aria-hidden="true"><span class="spark"></span><span class="spark"></span><span class="spark"></span><span class="spark"></span></div>
  <div class="fireworks fireworks-3" aria-hidden="true"><span class="spark"></span><span class="spark"></span><span class="spark"></span><span class="spark"></span></div>
</div>

<div class="app">
  <div class="title">Lesson complete!</div>
  <div class="scene">
    <div class="emoji-container">
      <lottie-player src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f973/lottie.json" background="transparent" speed="1" loop autoplay aria-label="🥳 Party emoji"></lottie-player>
    </div>
  </div>
  <div class="stats" id="statsContainer">
    <div class="stat tiger" id="stat1">
      <div class="stat-header" id="stat1Header">TOTAL XP</div>
      <div class="stat-content"><div class="value" id="stat1Value"><i class="ph-fill ph-lightning"></i> <span id="xpValue">0</span></div></div>
    </div>
    <div class="stat carpenter-blue" id="stat2">
      <div class="stat-header" id="stat2Header">COMMITTED</div>
      <div class="stat-content"><div class="value" id="stat2Value"><i class="ph-duotone ph-clock-countdown"></i> <span id="timeValue">0s</span></div></div>
    </div>
    <div class="stat boa" id="stat3">
      <div class="stat-header" id="stat3Header">OUTSTANDING</div>
      <div class="stat-content"><div class="value" id="stat3Value"><i class="ph-duotone ph-target"></i> <span id="percentValue">0%</span></div></div>
    </div>
  </div>
</div>

<div class="continue-wrap">
  <button class="continue" id="continueBtn">CONTINUE</button>
</div>

<script>
  const audio = new Audio('https://github.com/EnzoFarai/RsLib/raw/main/audios/complete.mp3');
  audio.play().catch(e => console.log("Audio play failed:", e));

  const urlParams = new URLSearchParams(window.location.search);
  let correctAttempts = parseInt(urlParams.get('correctAttempts')) || 0;
  let totalAttempts = parseInt(urlParams.get('totalAttempts')) || 1;
  let timeSeconds = parseInt(urlParams.get('time')) || 0;
  let boost = parseFloat(urlParams.get('boost')) || null;

  const totalQuestions = 6;
  const T_expected = totalQuestions * 15;
  const T_max = 2 * T_expected;

  let ratio = correctAttempts / totalAttempts;
  let accuracyXP = Math.round(ratio * 10);
  accuracyXP = Math.min(accuracyXP, 10);

  let speedXP = 0;
  if (timeSeconds <= T_expected) {
    speedXP = 10;
  } else if (timeSeconds > T_expected && timeSeconds <= T_max) {
    speedXP = Math.round(10 * (2 - (timeSeconds / T_expected)));
    if (speedXP < 0) speedXP = 0;
  } else {
    speedXP = 0;
  }

  let totalXP = 10 + accuracyXP + speedXP;

  let displayedXP = totalXP;
  let stat1HeaderText = "TOTAL XP";
  if (boost !== null) {
    displayedXP = Math.round(totalXP * boost);
    stat1HeaderText = "XP BOOST";
  }
  document.getElementById('stat1Header').textContent = stat1HeaderText;
  document.getElementById('xpValue').textContent = displayedXP;

  let timeString = "";
  if (timeSeconds < 60) {
    timeString = `${timeSeconds}s`;
  } else if (timeSeconds < 3600) {
    let minutes = Math.floor(timeSeconds / 60);
    let seconds = timeSeconds % 60;
    timeString = seconds > 0 ? `${minutes}m ${seconds}s` : `${minutes}m`;
  } else {
    let hours = Math.floor(timeSeconds / 3600);
    timeString = `${hours}h`;
  }
  document.getElementById('timeValue').textContent = timeString;

  let stat2Header = (timeSeconds <= T_expected) ? "WHOA" : "COMMITTED";
  document.getElementById('stat2Header').textContent = stat2Header;

  let percentage = Math.round((correctAttempts / totalAttempts) * 100);
  let stat3Header = "";
  if (percentage === 100) stat3Header = "PERFECT";
  else if (percentage >= 80) stat3Header = "OUTSTANDING";
  else if (percentage >= 50) stat3Header = "NICE";
  else stat3Header = "YIKES";
  document.getElementById('stat3Header').textContent = stat3Header;
  document.getElementById('percentValue').textContent = `${percentage}%`;

  document.getElementById('continueBtn').addEventListener('click', () => {
    window.parent.postMessage('modalClose', '*');
  });
</script>
</body>
</html>
