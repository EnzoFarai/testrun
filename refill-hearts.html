<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearts Refill</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@phosphor-icons/web"></script>

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Atkinson Hyperlegible Next', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  background: #ffffff;
  color: #0f1c22;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  padding: 24px 18px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 20;
  background: transparent;
}

.title {
  margin-top: 20px;
  text-align: center;
  font-weight: 700;
  color: #4B4B4B;
  font-size: 20px;
  line-height: 1.4;
  max-width: 320px;
  z-index: 30;
  position: relative;
}

.subtitle {
  margin-top: 8px;
  text-align: center;
  font-weight: 400;
  color: #4B4B4B;
  font-size: 14px;
  line-height: 1.4;
  max-width: 280px;
  z-index: 30;
  position: relative;
}

.scene {
  position: relative;
  width: 100%;
  height: 200px;
  margin-top: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 30;
}

.emoji-container {
  position: relative;
  width: 160px;
  height: 160px;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 40;
}

lottie-player {
  width: 160px !important;
  height: 160px !important;
}

.buttons-container {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-top: 40px;
  z-index: 30;
  position: relative;
}

.action-button {
  width: 100%;
  height: 52px;
  border-radius: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  border: none;
  font-size: 15px;
  text-transform: uppercase;
  cursor: pointer;
  font-family: 'Atkinson Hyperlegible Next', sans-serif;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  gap: 6px;
}

.refill {
  color: #ffffff;
  background-color: #4285F4;
  border-bottom: 0.25rem solid #3a75d9;
}

.refill:hover:not(:disabled) {
  background-color: #3a75d9;
  border-bottom-color: #3166c4;
  transform: translateY(-0.125rem);
}

.refill:active:not(:disabled) {
  transform: translateY(0.0625rem);
  border-bottom-width: 0.125rem;
}

.no-thanks {
  color: #4285F4;
  background-color: #ffffff;
  border: 2px solid #4285F4;
  border-bottom: 0.25rem solid #4285F4;
}

.no-thanks:hover:not(:disabled) {
  background-color: #f0f7ff;
  transform: translateY(-0.125rem);
}

.no-thanks:active:not(:disabled) {
  transform: translateY(0.0625rem);
  border-bottom-width: 0.125rem;
}

.coin-icon {
  color: #ffffff;
  font-size: 18px;
  margin-right: -2px;
}

@media (max-width: 768px) {
  .title { font-size: 18px; max-width: 280px; }
  .subtitle { font-size: 13px; max-width: 260px; }
  .scene { height: 180px; }
  .emoji-container { width: 140px; height: 140px; }
  lottie-player { width: 140px !important; height: 140px !important; }
  .buttons-container { margin-top: 30px; }
  .action-button { height: 48px; font-size: 14px; }
}
</style>
</head>

<body>
<audio id="outOfHeartsAudio" preload="auto">
  <source src="https://github.com/EnzoFarai/RsLib/raw/main/audios/out-of-hearts.mp3" type="audio/mpeg">
</audio>

<div class="app">
  <div class="scene">
    <div class="emoji-container">
      <lottie-player
        src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f494/lottie.json"
        background="transparent"
        speed="1"
        loop
        autoplay
        aria-label=" Broken heart emoji">
      </lottie-player>
    </div>
  </div>

  <div class="title">You're out of hearts!</div>
  <div class="subtitle">You need hearts to progress and keep learning.</div>

  <div class="buttons-container">
    <button class="action-button refill" id="refillBtn">
      REFILL FOR <i class="ph-duotone ph-coin-vertical coin-icon"></i>450
    </button>
    <button class="action-button no-thanks" id="noThanksBtn">NO THANKS</button>
  </div>
</div>

<script>
  const audio = document.getElementById('outOfHeartsAudio');
  audio.play().catch(e => console.log("Audio play failed:", e));

  document.getElementById('refillBtn').addEventListener('click', () => {
    window.parent.postMessage({ type: 'refillHearts' }, '*');
  });

  document.getElementById('noThanksBtn').addEventListener('click', () => {
    window.parent.postMessage('modalQuit', '*');
  });
</script>
</body>
</html>
