<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Quit</title>

<!-- Atkinson Hyperlegible Next Font Import -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">

<!-- Lottie Player for Animated Emoji -->
<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Atkinson Hyperlegible Next', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  background: #ffffff;
  color: #0f1c22;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  padding: 24px 18px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 20;
  background: transparent;
}

/* Title - using Basalt color */
.title {
  margin-top: 20px;
  text-align: center;
  font-weight: 700;
  color: #4B4B4B;
  font-size: 20px;
  line-height: 1.4;
  max-width: 320px;
  z-index: 30;
  position: relative;
}

/* Emoji area */
.scene {
  position: relative;
  width: 100%;
  height: 200px;
  margin-top: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 30;
}

/* Emoji Container */
.emoji-container {
  position: relative;
  width: 160px;
  height: 160px;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 40;
}

/* Lottie Animation */
lottie-player {
  width: 160px !important;
  height: 160px !important;
}

/* Buttons Container */
.buttons-container {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-top: 40px;
  z-index: 30;
  position: relative;
}

/* Button Styles */
.action-button {
  width: 100%;
  height: 52px;
  border-radius: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  border: none;
  font-size: 15px;
  text-transform: uppercase;
  cursor: pointer;
  font-family: 'Atkinson Hyperlegible Next', sans-serif;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

/* Keep Going Button - Carpenter Blue */
.keep-going {
  color: #ffffff;
  background-color: #4285F4;
  border-bottom: 0.25rem solid #3a75d9;
}

.keep-going:hover:not(:disabled) {
  background-color: #3a75d9;
  border-bottom-color: #3166c4;
  transform: translateY(-0.125rem);
}

.keep-going:active:not(:disabled) {
  transform: translateY(0.0625rem);
  border-bottom-width: 0.125rem;
}

/* Quit Button - Ladybug */
.quit {
  color: #EA4335;
  background-color: #ffffff;
  border: 2px solid #EA4335;
  border-bottom: 0.25rem solid #EA4335;
}

.quit:hover:not(:disabled) {
  background-color: #FFF5F5;
  transform: translateY(-0.125rem);
}

.quit:active:not(:disabled) {
  transform: translateY(0.0625rem);
  border-bottom-width: 0.125rem;
}

/* Responsive adjustments */
@media (max-width: 768px) {
  .title {
    font-size: 18px;
    max-width: 280px;
  }
  
  .scene {
    height: 180px;
  }
  
  .emoji-container {
    width: 140px;
    height: 140px;
  }
  
  lottie-player {
    width: 140px !important;
    height: 140px !important;
  }
  
  .buttons-container {
    margin-top: 30px;
  }
  
  .action-button {
    height: 48px;
    font-size: 1rem;
  }
}
</style>
</head>

<body>
<div class="app">
  <div class="scene">
    <div class="emoji-container">
      <!-- Animated Concerned Emoji using Lottie -->
      <lottie-player
        src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f627/lottie.json"
        background="transparent"
        speed="1"
        loop
        autoplay
        aria-label="😧 Concerned emoji">
      </lottie-player>
    </div>
  </div>

  <div class="title">
    Are you sure you want to quit? You'll lose all XP gained in this lesson.
  </div>

  <div class="buttons-container">
    <button class="action-button keep-going" id="keepGoingBtn">
      KEEP GOING
    </button>
    
    <button class="action-button quit" id="quitBtn">
      QUIT
    </button>
  </div>
</div>

<script>
  window.modalOnContinue = null;
  window.modalOnQuit = null;
  
  document.getElementById('keepGoingBtn').addEventListener('click', () => {
    if (window.modalOnContinue) window.modalOnContinue();
  });
  
  document.getElementById('quitBtn').addEventListener('click', () => {
    if (window.modalOnQuit) {
      window.modalOnQuit();
    } else {
      window.location.href = 'https://vulanet.vercel.app/lesson';
    }
  });
</script>
</body>
</html>
