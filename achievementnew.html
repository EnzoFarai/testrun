<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XP Powerhouse Achievement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  /* Same as original achievement.html styles – preserved */
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Atkinson Hyperlegible', sans-serif; }
  body { background: #ffffff; color: #0f1c22; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .header { position: fixed; top: 0; left: 0; right: 0; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: transparent; z-index: 100; }
  .header-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #5F6368; font-size: 24px; }
  .app { width: 100%; max-width: 420px; min-height: 100vh; padding: 80px 18px 28px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: transparent; }
  .title { margin-top: 32px; text-align: center; font-weight: 700; color: #0f1c22; font-size: 20px; line-height: 1.4; max-width: 320px; }
  .scene { width: 100%; height: 220px; display: flex; justify-content: center; align-items: center; }
  .achievement-card { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; background: transparent; }
  .achievement-diamond { position: relative; width: 120px; height: 120px; transform: rotate(45deg); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; background-color: #2563eb; }
  .achievement-diamond-content { transform: rotate(-45deg); display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
  .achievement-icon { font-size: 32px; color: white; margin-bottom: 6px; }
  .material-symbols-outlined.achievement-icon { color: white !important; }
  .achievement-number { font-weight: 700; font-size: 18px; color: white; line-height: 1.2; }
  .achievement-title { font-weight: 600; font-size: 18px; margin-top: 8px; color: #0f1c22; }
  .achievement-date { font-size: 14px; color: #fff; background-color: #D4AF37; padding: 6px 16px; border-radius: 20px; font-weight: 600; }
  .buttons-container { width: 100%; display: flex; flex-direction: column; gap: 16px; margin-top: 40px; }
  .action-button { width: 100%; height: 52px; border-radius: 0.75rem; font-weight: 700; letter-spacing: 0.5px; border: none; font-size: 15px; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; line-height: 1; font-family: 'Atkinson Hyperlegible', sans-serif; }
  .claim-reward { color: #ffffff; background-color: #4285F4; border-bottom: 0.25rem solid #3a75d9; }
  .claim-reward:hover { background-color: #3a75d9; border-bottom-color: #3166c4; transform: translateY(-0.125rem); }
  .share-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
  .share-content { width: 100%; max-width: 357px; background: #f5f5f7; border-radius: 24px; overflow: hidden; }
  .share-card { background: #ffffff; border-radius: 24px; padding: 32px 24px 28px; margin-bottom: 10px; text-align: center; display: flex; flex-direction: column; align-items: center; }
  .share-brand { margin-top: 16px; font-weight: 700; color: #4285F4; font-size: 24px; }
  .share-sheet { background: #fff; border-top: 1px solid #dadada; border-radius: 24px 24px 0 0; padding: 16px 12px; }
  .share-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .share-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
  .share-icon-circle { width: 44px; height: 44px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
  .share-icon img { width: 28px; height: 28px; object-fit: contain; }
  .share-text { font-size: 11px; color: #333; }
  .bottom-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 0 20px; }
  .bottom-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
  .bottom-icon-circle { width: 44px; height: 44px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
  .bottom-text { font-size: 11px; color: #333; }
  @media (max-width: 768px) { .title { font-size: 18px; max-width: 280px; } .scene { height: 200px; } .achievement-diamond { width: 110px; height: 110px; } .achievement-icon { font-size: 28px; } .achievement-number { font-size: 16px; } .buttons-container { margin-top: 32px; } .action-button { height: 48px; font-size: 14px; } }
</style>
</head>
<body>
<div class="header">
  <div class="header-icon" id="exit-button"><span class="material-symbols-outlined">close</span></div>
  <div class="header-icon" id="share-button"><span class="material-symbols-outlined">upload</span></div>
</div>

<div class="app">
  <div class="scene">
    <div class="achievement-card" id="achievement-card">
      <div class="achievement-diamond">
        <div class="achievement-diamond-content">
          <span class="material-symbols-outlined achievement-icon">exercise</span>
          <div class="achievement-number">30000</div>
        </div>
      </div>
      <div class="achievement-title">XP Powerhouse</div>
      <div class="achievement-date" id="currentDate"></div>
    </div>
  </div>

  <div class="title" id="title-text">
    You earned XP Powerhouse by gaining 30000 XP!
  </div>

  <div class="buttons-container">
    <button class="action-button claim-reward" id="claimRewardBtn">CLAIM REWARD</button>
  </div>
</div>

<div class="share-overlay" id="share-overlay">
  <div class="share-content">
    <div class="share-card" id="share-card">
      <div class="achievement-diamond"><div class="achievement-diamond-content"><span class="material-symbols-outlined achievement-icon">exercise</span><div class="achievement-number">30000</div></div></div>
      <div class="achievement-title">XP Powerhouse</div>
      <div class="achievement-date" id="shareDate"></div>
      <div class="title" style="margin-top: 20px; font-size: 18px;">I earned XP Powerhouse by gaining 30000 XP!</div>
      <div class="share-brand">vulanet</div>
    </div>
    <div class="share-sheet">
      <div class="share-grid"> ... </div> <!-- same as before -->
      <div class="bottom-grid"> ... </div>
    </div>
  </div>
</div>

<script>
  // Play achievement sound
  const achievementAudio = new Audio('https://github.com/EnzoFarai/RsLib/raw/main/audios/achievement.mp3');
  achievementAudio.play().catch(e => console.log("Audio play failed:", e));

  // Set current date
  const now = new Date();
  const day = now.getDate();
  const month = now.toLocaleString('en-US', { month: 'long' });
  const year = now.getFullYear();
  const dateStr = `${day} ${month} ${year}`;
  document.getElementById('currentDate').textContent = dateStr;
  document.getElementById('shareDate').textContent = dateStr;

  // Share overlay (same as original)
  const shareOverlay = document.getElementById('share-overlay');
  document.getElementById('share-button').addEventListener('click', () => shareOverlay.style.display = 'flex');
  shareOverlay.addEventListener('click', (e) => { if (e.target === shareOverlay) shareOverlay.style.display = 'none'; });
  document.getElementById('exit-button').addEventListener('click', () => window.parent.postMessage('modalClose', '*'));
  
  // Coin reward trigger: when claiming reward, if this is Level 8 (30000 XP), we should send a message to open coins-reward.html
  // But the parent will handle that after this modal closes.
  // For now, we just close the modal. The parent will check the achievement level and open coins-reward if needed.
  document.getElementById('claimRewardBtn').addEventListener('click', () => {
    // TODO: Check if achievement level is 8 (30000 XP) and if so, parent will show coin reward.
    // We simply close the modal. Parent's finishQuiz sequence will handle the rest.
    window.parent.postMessage('modalClose', '*');
  });

  // Save image, share handlers (same as original – omitted for brevity but must be included. I'll add a minimal version)
  document.getElementById('save-image')?.addEventListener('click', async () => { const card = document.getElementById('share-card'); await document.fonts.ready; html2canvas(card, { scale: 2 }).then(canvas => { const link = document.createElement('a'); link.download = 'achievement.png'; link.href = canvas.toDataURL('image/png'); link.click(); }); });
  // ... other share handlers identical to your original.
</script>
</body>
</html>
