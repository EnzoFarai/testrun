<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Daily Quests</title>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    /* Same as your provided daily-quest.html styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; font-family: 'Atkinson Hyperlegible Next', system-ui; -webkit-font-smoothing: antialiased; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 24px 16px; }
    .daily-quests-module { max-width: 500px; width: 100%; margin: 0 auto; }
    .section-title { font-family: 'Atkinson Hyperlegible Next', sans-serif; font-size: 22px; margin: 0; color: #3b3b3b; font-weight: 700; }
    .time-cta { color: #ff9f1a; font-weight: 700; display: flex; align-items: center; gap: 8px; font-size: 14px; }
    .card { background: #ffffff; border-radius: 18px; padding: 0; border: 1px solid #eee; box-shadow: 0 6px 18px rgba(15,15,15,0.06); margin-bottom: 24px; }
    .quests { margin-top: 8px; border-radius: 14px; overflow: hidden; border: 1px solid #eee; }
    .quest-row { padding: 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f0f0f0; background: #fff; cursor: pointer; transition: background 0.2s; }
    .quest-row:last-child { border-bottom: 0; }
    .quest-row:hover { background: #fafafa; }
    .quest-info { flex: 1; }
    .quest-title { font-weight: 700; margin: 0 0 10px; color: #444; font-size: 15px; }
    .progress-wrapper { position: relative; width: 100%; }
    .progress-bar { height: 28px; background: #e6e6e6; border-radius: 20px; position: relative; overflow: hidden; display: flex; align-items: center; }
    .progress-inner { height: 12px; background: #ffa726; border-radius: 12px; box-shadow: inset 0 -4px 8px rgba(255,255,255,0.25); }
    .progress-count { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: #fff; font-weight: 700; letter-spacing: 1px; font-size: 13px; z-index: 2; text-shadow: 0 1px 2px rgba(0,0,0,0.1); pointer-events: none; white-space: nowrap; }
    .progress-count.dark-text { color: #666; text-shadow: none; }
    .chest { width: 44px; height: 44px; border-radius: 8px; flex: 0 0 44px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: transform 0.1s ease; }
    .chest:active { transform: scale(0.95); }
    .bronze { color: #cd7f32; }
    .silver { color: #c0c0c0; }
    .gold { color: #ffd700; }
    .continue-action { width: 100%; margin-top: 8px; margin-bottom: 0; }
    .continue-btn { width: 100%; background: #4285F4; border: none; border-radius: 0.75rem; padding: 14px 20px; font-weight: 700; font-size: 15px; text-transform: uppercase; color: white; cursor: pointer; border-bottom: 4px solid #3a75d9; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: all 0.2s ease; font-family: 'Atkinson Hyperlegible Next', sans-serif; letter-spacing: 0.5px; }
    .continue-btn:hover { background: #2a75f0; transform: translateY(-1px); }
    .continue-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
    .daily-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .chest.claimed { opacity: 0.5; filter: grayscale(0.3); pointer-events: none; }
  </style>
</head>
<body>
  <div class="daily-quests-module">
    <div class="daily-header-row">
      <div class="section-title">Daily Quests</div>
      <div class="time-cta"><i class="ph-bold ph-clock-countdown" style="color: #ff9f1a;"></i>20 MINUTES</div>
    </div>

    <div class="card quests">
      <div class="quest-row" id="quest1Row">
        <div class="quest-info">
          <div class="quest-title">Start a streak</div>
          <div class="progress-wrapper">
            <div class="progress-bar"><div class="progress-inner" style="width: calc(100% - 20px); margin-left: 10px;"></div><div class="progress-count">1 / 1</div></div>
          </div>
        </div>
        <div class="chest bronze" id="chestBronze"><i class="ph-duotone ph-treasure-chest" style="font-size: 32px;"></i></div>
      </div>

      <div class="quest-row" id="quest2Row">
        <div class="quest-info">
          <div class="quest-title">Score 80% or higher in 3 lessons</div>
          <div class="progress-wrapper">
            <div class="progress-bar"><div class="progress-inner" id="quest2Fill" style="width: 0px; margin-left: 0px; background: #d9d9d9;"></div><div class="progress-count dark-text" id="quest2Count">0 / 3</div></div>
          </div>
        </div>
        <div class="chest silver" id="chestSilver"><i class="ph-duotone ph-treasure-chest" style="font-size: 32px;"></i></div>
      </div>

      <div class="quest-row" id="quest3Row">
        <div class="quest-info">
          <div class="quest-title">Complete 4 lessons</div>
          <div class="progress-wrapper">
            <div class="progress-bar"><div class="progress-inner" id="quest3Fill" style="width: calc(25% - 20px); margin-left: 10px;"></div><div class="progress-count" id="quest3Count">1 / 4</div></div>
          </div>
        </div>
        <div class="chest gold" id="chestGold"><i class="ph-duotone ph-treasure-chest" style="font-size: 32px;"></i></div>
      </div>
    </div>
    
    <div class="continue-action">
      <button class="continue-btn" id="continueButton">CONTINUE</button>
    </div>
  </div>

  <script>
    // Play quest sound
    const questAudio = new Audio('https://github.com/EnzoFarai/RsLib/raw/main/audios/quest.mp3');
    questAudio.play().catch(e => console.log("Audio play failed:", e));

    // Parse URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const correctAttempts = parseInt(urlParams.get('correctAttempts')) || 0;
    const totalAttempts = parseInt(urlParams.get('totalAttempts')) || 1;
    const completed = urlParams.get('completed') === 'true';

    // Calculate percentage for quest 2
    const percentage = Math.round((correctAttempts / totalAttempts) * 100);
    let quest2Progress = 0;
    let quest2Text = "0 / 3";
    if (percentage >= 80) {
      quest2Progress = 1;
      quest2Text = "1 / 3";
    }
    const quest2Fill = document.getElementById('quest2Fill');
    const quest2CountSpan = document.getElementById('quest2Count');
    if (quest2Progress === 1) {
      quest2Fill.style.width = "calc(33% - 20px)";
      quest2Fill.style.marginLeft = "10px";
      quest2Fill.style.background = "#ffa726";
      quest2CountSpan.textContent = quest2Text;
      quest2CountSpan.classList.remove('dark-text');
    }

    // Quest 3: if completed is true, set to 1/4 (already default in HTML, but ensure)
    if (completed) {
      document.getElementById('quest3Fill').style.width = "calc(25% - 20px)";
      document.getElementById('quest3Fill').style.marginLeft = "10px";
      document.getElementById('quest3Count').textContent = "1 / 4";
    }

    // Chest claiming logic with localStorage
    const today = new Date().toISOString().slice(0,10); // YYYY-MM-DD
    const storageKey = `questClaims_${today}`;
    let claimedChests = { bronze: false, silver: false, gold: false };

    // Load claimed status from localStorage
    const saved = localStorage.getItem(storageKey);
    if (saved) {
      claimedChests = JSON.parse(saved);
    }

    // Define chest coin values
    const chestValues = { bronze: 50, silver: 75, gold: 100 };

    // Helper to show coins reward modal (sends postMessage to parent)
    function showCoinsReward(amount) {
      // We need to open the modal from within the iframe? Actually parent will handle it.
      // But the requirement says: tapping a chest in daily-quest.html opens coins-reward.html.
      // Since daily-quest is inside an iframe, we can ask the parent to open the modal.
      window.parent.postMessage({ type: 'openCoinsReward', amount: amount }, '*');
    }

    // Helper to mark chest as claimed and update UI
    function claimChest(chestId, amount) {
      if (claimedChests[chestId]) return;
      claimedChests[chestId] = true;
      localStorage.setItem(storageKey, JSON.stringify(claimedChests));
      const chestElement = document.getElementById(`chest${chestId.charAt(0).toUpperCase() + chestId.slice(1)}`);
      if (chestElement) chestElement.classList.add('claimed');
      showCoinsReward(amount);
    }

    // Check if quests are actually completed
    let quest1Completed = true; // always true for "Start a streak"
    let quest2Completed = (quest2Progress === 1);
    let quest3Completed = (completed && parseInt(document.getElementById('quest3Count').innerText.split('/')[0]) >= 1);

    // Add click handlers to chests
    const bronzeChest = document.getElementById('chestBronze');
    const silverChest = document.getElementById('chestSilver');
    const goldChest = document.getElementById('chestGold');

    if (bronzeChest) {
      bronzeChest.addEventListener('click', (e) => {
        e.stopPropagation();
        if (claimedChests.bronze) return;
        if (quest1Completed) claimChest('bronze', chestValues.bronze);
        else alert("Complete 'Start a streak' quest first!");
      });
    }
    if (silverChest) {
      silverChest.addEventListener('click', (e) => {
        e.stopPropagation();
        if (claimedChests.silver) return;
        if (quest2Completed) claimChest('silver', chestValues.silver);
        else alert("Complete 'Score 80% or higher in 3 lessons' quest first!");
      });
    }
    if (goldChest) {
      goldChest.addEventListener('click', (e) => {
        e.stopPropagation();
        if (claimedChests.gold) return;
        if (quest3Completed) claimChest('gold', chestValues.gold);
        else alert("Complete 'Complete 4 lessons' quest first!");
      });
    }

    // If multiple chests are ready at once (e.g., all three completed this lesson), we should show sum.
    // This is handled by the parent when it opens daily-quest? Actually the requirement says:
    // "Multiple chests claimed at once (e.g., completing all 3 quests in one lesson): show SUM (50+75+100 = 225)"
    // We can check on page load if all three are completed and not claimed, then automatically show one combined reward.
    // But to keep simple, we'll leave it as individual chests for now. The parent can also aggregate by listening.
    // I'll add a check: if all three are completed and none claimed, automatically claim all three as sum.
    if (quest1Completed && quest2Completed && quest3Completed && !claimedChests.bronze && !claimedChests.silver && !claimedChests.gold) {
      const totalCoins = chestValues.bronze + chestValues.silver + chestValues.gold;
      // Mark all as claimed
      claimedChests.bronze = claimedChests.silver = claimedChests.gold = true;
      localStorage.setItem(storageKey, JSON.stringify(claimedChests));
      document.getElementById('chestBronze').classList.add('claimed');
      document.getElementById('chestSilver').classList.add('claimed');
      document.getElementById('chestGold').classList.add('claimed');
      showCoinsReward(totalCoins);
    }

    // Apply claimed styling on load
    if (claimedChests.bronze) document.getElementById('chestBronze')?.classList.add('claimed');
    if (claimedChests.silver) document.getElementById('chestSilver')?.classList.add('claimed');
    if (claimedChests.gold) document.getElementById('chestGold')?.classList.add('claimed');

    // Continue button
    document.getElementById('continueButton').addEventListener('click', () => {
      window.parent.postMessage('modalClose', '*');
    });
  </script>
</body>
</html>
